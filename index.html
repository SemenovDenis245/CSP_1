<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WkilaStore</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">WkilaStore</h1>
            
            <nav class="site-nav">
                <ul class="menu">
                    <li class="menu-item"><a href="index.html">Главная</a></li>
                    <li class="menu-item"><a href="catalog.html">Каталог</a></li>
                </ul>
            </nav>

            <div class="header-cart">
                <button class="cart-button" id="cartToggle">
                    Корзина (<span id="cartCount">0</span>)
                </button>
            
                <div class="cart-dropdown" id="cartDropdown">
                    <h3 class="cart-title">Корзина</h3>
                    <div id="cartItems">
                        <p class="cart-empty">Корзина пуста</p>
                    </div>
                    <p id="cartTotal" class="cart-total">Итого: 0 ₽</p>
                    <button id="payButton" class="pay-button">Оплатить</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h2 class="section-title">Добро пожаловать!</h2>
            <p class="hero-text">
                Это интернет-магазин техники Apple. <br> 
                Здесь вы можете ознакомиться с популярными моделями iPhone, iPad и MacBook.
            </p>

            <p class="hero-text">
                Перейдите в <a href="catalog.html">каталог</a>, чтобы посмотреть товары.
            </p>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 WkilaStore</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
